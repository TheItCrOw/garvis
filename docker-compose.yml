services:
  ollama:
    image: ollama/ollama:latest
    container_name: garvis-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    command: ["ollama", "serve"]
    environment:
      OLLAMA_HOST: 0.0.0.0:11434    
    # If your Docker host supports NVIDIA GPU passthrough, this enables it.
    # If you get errors, remove this whole "deploy:" section and it will run on CPU.

  backend:
    build: ./garvis-backend
    container_name: garvis-backend
    ports:
      - "8000:8000"
    env_file:
      - ./garvis-backend/.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/adc.json
      GOOGLE_CLOUD_QUOTA_PROJECT: ${GOOGLE_CLOUD_QUOTA_PROJECT}
      OLLAMA_BASE_URL: http://0.0.0.0:11434
    volumes:
      - ${ADC_PATH}:/secrets/adc.json:ro
    depends_on:
      - ollama

  client:
    build: ./garvis-client
    container_name: garvis-client
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_WS_URL: ${VITE_BACKEND_WS_URL}
      VITE_API_BASE: ${VITE_API_BASE}
    depends_on:
      - backend


volumes:
  ollama: