services:
  backend:
    build: ./garvis-backend
    container_name: garvis-backend
    ports:
      - "8000:8000"
    env_file:
      - ./garvis-backend/.env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/adc.json
      GOOGLE_CLOUD_QUOTA_PROJECT: ${GOOGLE_CLOUD_QUOTA_PROJECT}
      OLLAMA_BASE_URL: http://ollama:11434

    volumes:
      - ${ADC_PATH}:/secrets/adc.json:ro
    depends_on:
      - ollama

  client:
    build: ./garvis-client
    container_name: garvis-client
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_WS_URL: ${VITE_BACKEND_WS_URL}
      VITE_API_BASE: ${VITE_API_BASE}
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: garvis-ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama:/root/.ollama

    gpus:
      - driver: nvidia
        count: all
        capabilities: [gpu]

    entrypoint: ["/bin/sh", "-lc"]
    command: >
      '
      ollama serve &
      pid=$!;
      echo "Waiting for server...";
      until ollama list >/dev/null 2>&1; do sleep 2; done;

      echo "Pulling models (cached if already present)...";
      ollama pull thiagomoraes/medgemma-4b-it:Q4_K_M || true;
      ollama pull MedAIBase/MedGemma1.5:4b || true;

      echo "Server ready.";
      wait $pid
      '

volumes:
  ollama: